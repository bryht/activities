name: Deploy API

# Ships the Rust API to the server. We cross-build a glibc binary inside an
# Ubuntu 20.04 container (matching the host's libc — the box is too small to
# compile Rust on), then scp it to /opt/kidgo and restart the systemd service.
on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

# One deploy at a time; let an in-flight run finish rather than ship a half-copy.
concurrency:
  group: deploy-api
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Cross-build glibc binary (Ubuntu 20.04)
        working-directory: backend
        run: |
          docker build -t kidgo-api-build -f Dockerfile.ubuntu20 .
          cid=$(docker create kidgo-api-build)
          docker cp "$cid:/app/target/release/kidgo-api" ./kidgo-api
          docker rm "$cid"
          chmod +x ./kidgo-api
          file ./kidgo-api

      - name: Ship to server & restart
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          SSH_PORT: ${{ vars.DEPLOY_SSH_PORT || '22' }}
          DEPLOY_PATH: ${{ vars.KIDGO_DEPLOY_PATH || '/opt/kidgo' }}
          # HMAC key for manage-link tokens (auth.rs). Optional: when set, we
          # upsert it into the server's .env so links survive restarts. Leave the
          # secret unset to manage the value by hand on the box instead.
          LINK_SECRET: ${{ secrets.KIDGO_LINK_SECRET }}
          # AI gateway for image (vision) & voice-note (audio) understanding.
          # Only the key is secret; base URL + models are plain defaults (override
          # via repo variables). When the key is set, we upsert the six
          # KIDGO_VISION_*/KIDGO_AUDIO_* lines on deploy.
          AI_KEY: ${{ secrets.KIDGO_AI_GATEWAY_KEY }}
          AI_BASE: ${{ vars.KIDGO_AI_BASE_URL || 'https://opencode.ai/zen/go/v1/chat/completions' }}
          VISION_MODEL: ${{ vars.KIDGO_VISION_MODEL || 'qwen3.6-plus' }}
          AUDIO_MODEL: ${{ vars.KIDGO_AUDIO_MODEL || 'mimo-v2-omni' }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Upload to a temp path, then atomically swap in & restart (sudo).
          scp -P "$SSH_PORT" -i ~/.ssh/id_deploy \
            backend/kidgo-api "$SSH_USER@$SSH_HOST:/tmp/kidgo-api.new"

          # Set KIDGO_LINK_SECRET on the server only when the GitHub secret is
          # provided — replacing just that line, never touching DATABASE_URL etc.
          if [ -n "$LINK_SECRET" ]; then
            ENV_UPDATE="sudo touch '$DEPLOY_PATH/.env' \
              && sudo sed -i '/^KIDGO_LINK_SECRET=/d' '$DEPLOY_PATH/.env' \
              && echo 'KIDGO_LINK_SECRET=$LINK_SECRET' | sudo tee -a '$DEPLOY_PATH/.env' >/dev/null \
              && sudo chmod 600 '$DEPLOY_PATH/.env'"
          else
            ENV_UPDATE="true"
          fi

          # Upsert the vision/audio provider config when the gateway key is set —
          # replacing only the KIDGO_VISION_*/KIDGO_AUDIO_* lines.
          if [ -n "$AI_KEY" ]; then
            AI_UPDATE="sudo touch '$DEPLOY_PATH/.env' \
              && sudo sed -i '/^KIDGO_VISION_/d; /^KIDGO_AUDIO_/d' '$DEPLOY_PATH/.env' \
              && printf '%s\n' \
                 'KIDGO_VISION_BASE_URL=$AI_BASE' \
                 'KIDGO_VISION_API_KEY=$AI_KEY' \
                 'KIDGO_VISION_MODEL=$VISION_MODEL' \
                 'KIDGO_AUDIO_BASE_URL=$AI_BASE' \
                 'KIDGO_AUDIO_API_KEY=$AI_KEY' \
                 'KIDGO_AUDIO_MODEL=$AUDIO_MODEL' | sudo tee -a '$DEPLOY_PATH/.env' >/dev/null \
              && sudo chmod 600 '$DEPLOY_PATH/.env'"
          else
            AI_UPDATE="true"
          fi

          ssh -p "$SSH_PORT" -i ~/.ssh/id_deploy "$SSH_USER@$SSH_HOST" \
            "sudo install -o root -g root -m 755 /tmp/kidgo-api.new '$DEPLOY_PATH/kidgo-api' \
             && rm -f /tmp/kidgo-api.new \
             && $ENV_UPDATE \
             && $AI_UPDATE \
             && sudo systemctl restart kidgo-api \
             && sleep 2 && systemctl is-active kidgo-api"

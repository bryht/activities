name: Deploy Bot

# Ships the multi-platform bot (Node) to the server. No build step — we rsync the
# source and run `npm ci` on the box. The server .env is preserved by rsync; the
# CI-managed platform secrets (Telegram/WhatsApp/Signal) are merged into it on
# each deploy, leaving hand-managed keys (KIDGO_API_BASE, LOG_LEVEL, PORT,
# SIGNAL_JSONRPC, …) intact. A secret left unset is simply not written.
on:
  push:
    branches: [main]
    paths:
      - 'bot/**'
      - '.github/workflows/deploy-bot.yml'
  workflow_dispatch:

concurrency:
  group: deploy-bot
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          SSH_PORT: ${{ vars.DEPLOY_SSH_PORT || '22' }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync source & restart
        env:
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          SSH_PORT: ${{ vars.DEPLOY_SSH_PORT || '22' }}
          DEPLOY_PATH: ${{ vars.KIDGO_BOT_PATH || '/opt/kidgo-bot' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          WHATSAPP_TOKEN: ${{ secrets.WHATSAPP_TOKEN }}
          WHATSAPP_VERIFY_TOKEN: ${{ secrets.WHATSAPP_VERIFY_TOKEN }}
          SIGNAL_NUMBER: ${{ secrets.SIGNAL_NUMBER }}
        run: |
          # --delete keeps the server tree in sync; the excludes preserve the
          # server .env and the server-built node_modules.
          rsync -az --delete \
            --exclude 'node_modules/' \
            --exclude '.env' \
            -e "ssh -p $SSH_PORT -i ~/.ssh/id_deploy" \
            bot/ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"

          # Collect whichever platform secrets are set into a fragment file (never
          # on a command line; GitHub masks the values in logs), scp it over, and
          # merge: drop any key the fragment redefines from the existing .env, then
          # append the fragment. Keys not present in the fragment are untouched.
          frag="$(mktemp)"
          for k in TELEGRAM_BOT_TOKEN WHATSAPP_PHONE_NUMBER_ID WHATSAPP_TOKEN WHATSAPP_VERIFY_TOKEN SIGNAL_NUMBER; do
            v="$(printenv "$k" || true)"
            [ -n "$v" ] && printf '%s=%s\n' "$k" "$v" >> "$frag"
          done

          SSH="ssh -p $SSH_PORT -i ~/.ssh/id_deploy"
          if [ -s "$frag" ]; then
            scp -P "$SSH_PORT" -i ~/.ssh/id_deploy "$frag" "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/.env.ci"
            $SSH "$SSH_USER@$SSH_HOST" "cd '$DEPLOY_PATH' \
              && touch .env \
              && keys=\$(sed -n 's/^\([A-Z_][A-Z0-9_]*\)=.*/\1/p' .env.ci) \
              && cp .env .env.new \
              && for k in \$keys; do grep -v \"^\$k=\" .env.new > .env.tmp || true; mv .env.tmp .env.new; done \
              && cat .env.ci >> .env.new \
              && mv .env.new .env \
              && rm -f .env.ci \
              && chmod 600 .env"
          else
            echo 'No bot platform secrets set — leaving server .env untouched.'
          fi
          rm -f "$frag"

          $SSH "$SSH_USER@$SSH_HOST" \
            "cd '$DEPLOY_PATH' \
             && npm ci --omit=dev \
             && sudo systemctl restart kidgo-bot \
             && sleep 2 && systemctl is-active kidgo-bot"

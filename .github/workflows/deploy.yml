name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancelling in-progress runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # The production website lives in frontend/ (the design/ prototype is retired).
    defaults:
      run:
        working-directory: frontend
    env:
      # The site talks to the KidGo API behind the api.bryht.net reverse proxy.
      VITE_API_BASE: https://api.bryht.net/kid-go
      VITE_BOT_USERNAME: ${{ vars.KIDGO_BOT_USERNAME || 'kidgo_bot' }}
      VITE_BOT_LINK: ${{ vars.KIDGO_BOT_LINK || 'https://t.me/kidgo_bot' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      # SPA fallback: serve index.html for unknown deep-link paths
      - run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

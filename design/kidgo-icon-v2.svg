<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="kidgo icon">
  <defs>
    <!-- bold brand gradient = the tile itself -->
    <linearGradient id="kg-tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#FF9F43"/>
      <stop offset="1"   stop-color="#FF5E7E"/>
    </linearGradient>
    <!-- subtle inner sheen for depth -->
    <radialGradient id="kg-sheen" cx="0.3" cy="0.25" r="0.9">
      <stop offset="0"   stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.6" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- soft shadow under mascot -->
    <filter id="kg-shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#7a1f33" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- app tile -->
  <rect width="512" height="512" rx="115" fill="url(#kg-tile)"/>
  <rect width="512" height="512" rx="115" fill="url(#kg-sheen)"/>

  <g transform="translate(256 256)">

    <!-- motion lines: emanate from BEHIND the mascot (drawn first) -->
    <g stroke="#33E0F0" stroke-width="24" stroke-linecap="round">
      <line x1="-176" y1="-62" x2="-96" y2="-62"/>
      <line x1="-192" y1="0"   x2="-86" y2="0"/>
      <line x1="-176" y1="62"  x2="-96" y2="62"/>
    </g>

    <!-- mascot head: clean white, centered, with soft depth -->
    <circle cx="22" cy="0" r="150" fill="#FFFFFF" filter="url(#kg-shadow)"/>

    <!-- cheeks (symmetric around head center x=22) -->
    <circle cx="-50" cy="44" r="22" fill="#FFB0A1" opacity="0.85"/>
    <circle cx="94"  cy="44" r="22" fill="#FFB0A1" opacity="0.85"/>

    <!-- eyes: symmetric, friendly, centered pupils + highlight -->
    <g fill="#2B2440">
      <circle cx="-14" cy="-20" r="21"/>
      <circle cx="58"  cy="-20" r="21"/>
    </g>
    <g fill="#FFFFFF">
      <circle cx="-21" cy="-29" r="7"/>
      <circle cx="51"  cy="-29" r="7"/>
    </g>

    <!-- happy smile, centered on head -->
    <path d="M-18 36 Q 22 78 62 36" fill="none"
          stroke="#2B2440" stroke-width="15" stroke-linecap="round"/>

    <!-- single integrated sparkle (white, lives in the tile corner) -->
    <path d="M158 -150 c4 18 8 22 26 26 -18 4 -22 8 -26 26 -4 -18 -8 -22 -26 -26 18 -4 22 -8 26 -26 z"
          fill="#FFFFFF" opacity="0.92"/>
  </g>
</svg>

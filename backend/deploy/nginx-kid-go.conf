# KidGo API reverse-proxy block — add inside the existing
# `server { server_name api.bryht.net; ... }` in /etc/nginx/sites-enabled/api.bryht.net.
#
# The trailing slash on both location and proxy_pass strips the /kid-go prefix,
# so the Rust app sees plain paths (/health, /api/activities, …) and needs no
# API_PREFIX. Public URL: https://api.bryht.net/kid-go/...

location = /kid-go { return 301 /kid-go/; }

location /kid-go/ {
    proxy_pass http://127.0.0.1:8090/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
}
